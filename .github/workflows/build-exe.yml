name: Build Crowndrip EXE (Direct Project Build)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 允許手動從 GitHub 網頁觸發

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 設置現代 .NET 核心環境
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # 如果專案是 .NET 9，請改為 '9.0.x'

    # 現代化還原機制，確保 64位元 套件正確下載
    - name: Restore Dependencies
      run: dotnet restore src/Crowndrip_UI/Crowndrip_UI.csproj -r win-x64

    # 強制發行為 64位元 (x64) 且將所有 Runtime DLL 完整釋放至輸出目錄
    - name: Publish Project (Release x64 with DLLs)
      run: |
        dotnet publish src/Crowndrip_UI/Crowndrip_UI.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=false `
          -p:PublishReadyToRun=true `
          -o "build/Latest_Version"

    # 上傳編譯成品 (這裡明確指示上傳該目錄下的所有 exe 與 dll)
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Crowndrip-Release-Package
        path: |
          build/Latest_Version/*.exe
          build/Latest_Version/*.dll
