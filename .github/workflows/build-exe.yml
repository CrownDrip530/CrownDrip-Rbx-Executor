name: Build Crowndrip EXE (Direct Project Build)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 允許手動從 GitHub 網頁觸發

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: nuget/setup-nuget@v2

    # 方案 A：直接對專案檔進行 NuGet 還原，跳過 .sln
    - name: Restore NuGet Packages
      run: nuget restore src/Crowndrip_UI/Crowndrip_UI.csproj

    # 方案 A：直接編譯 .csproj 檔案
    # 這會避開 "No file format header found" 的 .sln 錯誤
    - name: Build Project (Release)
      run: |
        msbuild src/Crowndrip_UI/Crowndrip_UI.csproj `
        /p:Configuration=Release `
        /p:Platform="Any CPU" `
        /p:OutputPath=../../build/Latest_Version/

    # 上傳編譯成品
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Crowndrip-Release-Package
        # 這裡會抓取我們指定的輸出目錄中所有的執行檔與 DLL
        path: |
          build/Latest_Version/*.exe
          build/Latest_Version/*.dll
