name: Build Crowndrip EXE (Direct Project Build)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 允許手動從 GitHub 網頁觸發

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: nuget/setup-nuget@v2

    # 對專案檔進行 NuGet 還原
    - name: Restore NuGet Packages
      run: nuget restore src/Crowndrip_UI/Crowndrip_UI.csproj

    # 強制編譯為 64 位元 (x64) 架構，解決 Windows 64-bit runtime 報錯問題
    - name: Build Project (Release x64)
      run: |
        msbuild src/Crowndrip_UI/Crowndrip_UI.csproj `
        /p:Configuration=Release `
        /p:Platform="x64" `
        /p:Prefer32Bit=false `
        /p:OutputPath="../../build/Latest_Version/"

    # 上傳編譯成品 (包含 64 位元執行檔與所有相依 DLL)
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Crowndrip-Release-Package
        path: |
          build/Latest_Version/*.exe
          build/Latest_Version/*.dll
